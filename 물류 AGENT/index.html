<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>물류 AI Agent</title>
    <style>
      body {
        margin: 0;
      }

      .launch-notice {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        color: #e2e8f0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        padding: 24px;
      }

      .launch-notice__card {
        max-width: 560px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.9);
        padding: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .launch-notice__title {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
      }

      .launch-notice__text {
        margin: 0 0 10px;
        line-height: 1.6;
        color: #cbd5e1;
      }

      .launch-notice__code {
        margin: 14px 0 0;
        padding: 14px 16px;
        border-radius: 14px;
        background: #020617;
        color: #93c5fd;
        font-size: 14px;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="launch-notice">
        <div class="launch-notice__card">
          <h1 class="launch-notice__title">직접 `index.html`을 열면 실행되지 않습니다.</h1>
          <p class="launch-notice__text">이 화면은 Vite와 Node 서버 위에서 구동되는 React 앱입니다.</p>
          <p class="launch-notice__text">`http://localhost:3002`로 접속해서 확인하세요.</p>
          <div class="launch-notice__code">1. `run-local.cmd` 실행
2. 또는 터미널에서 `npm.cmd run build` 후 `npm.cmd start` 실행</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
